name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-vet-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build binaries
        run: go build ./cmd/frisco
